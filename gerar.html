<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Imagens</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 20px;
    }

    form {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #45a049;
      transform: scale(1.05);
    }

    img {
      margin-top: 20px;
      width: 100%;
      border-radius: 10px;
    }

    #loading {
      margin-top: 10px;
      font-weight: bold;
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🎨 Gerador de Imagens</h1>

  <form id="form">
    <input type="text" id="prompt" placeholder="Descreva sua imagem..." required>
    <button type="submit">Gerar</button>
  </form>

  <p id="loading">⏳ Gerando imagem...</p>

  <img id="imagem" src="">

</div>

<script>
const form = document.getElementById("form");
const input = document.getElementById("prompt");
const img = document.getElementById("imagem");
const loading = document.getElementById("loading");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  loading.style.display = "block";
  img.src = "";

  const imageUrl = "https://picsum.photos/400?random=" + Math.random();

  setTimeout(function() {
    img.src = imageUrl;
    loading.style.display = "none";
  }, 800);
});
</script>

</body>
</html>
