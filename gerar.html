<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Imagens</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #222;
      color: white;
    }

    .container {
      margin-top: 50px;
    }

    input {
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    img {
      margin-top: 20px;
      width: 400px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Gerador de Imagens</h1>

  <form id="form">
    <input type="text" id="prompt" placeholder="Digite algo..." required>
    <button type="submit">Gerar</button>
  </form>

  <p id="loading" style="display:none;">Gerando imagem...</p>

  <img id="imagem" src="">

</div>

<script>
const form = document.getElementById("form");
const input = document.getElementById("prompt");
const img = document.getElementById("imagem");
const loading = document.getElementById("loading");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  loading.style.display = "block";
  img.src = "";

  const imageUrl = "https://picsum.photos/400?random=" + Math.random();

  setTimeout(function() {
    img.src = imageUrl;
    loading.style.display = "none";
  }, 1000);
});
</script>

</body>
</html>
