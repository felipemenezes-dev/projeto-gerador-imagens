<body>

<div class="container">

  <h1> Gerador de Imagens IA</h1>

  <form id="form">
    <input type="text" id="prompt" placeholder="Descreva sua imagem..." required>
    <button type="submit">Gerar</button>
  </form>

  <!-- sugestões -->
  <div class="sugestoes">
    <button onclick="usarPrompt('homem aranha realista')">🕷️ Spider-Man</button>
    <button onclick="usarPrompt('carro futurista neon')">🚗 Cyberpunk</button>
    <button onclick="usarPrompt('dragão voando')">🐉 Dragão</button>
  </div>

  <div id="loading">⏳ Gerando imagem...</div>

  <img id="imagem" src="">

  <a id="download" download>
    <button>⬇ Baixar</button>
  </a>

  <div class="historico">
    <h3>Histórico</h3>
    <ul id="listaHistorico"></ul>
  </div>

  <a class="voltar" href="index.html">⬅ Voltar</a>

</div>

<script>
window.usarPrompt = function(texto) {
  document.getElementById("prompt").value = texto;
};

const form = document.getElementById("form");
const input = document.getElementById("prompt");
const img = document.getElementById("imagem");
const loading = document.getElementById("loading");
const lista = document.getElementById("listaHistorico");
const download = document.getElementById("download");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const prompt = input.value;

  loading.style.display = "block";
  img.src = "";

  const imageUrl = "https://picsum.photos/400?random=" + Math.random();

  setTimeout(function() {
    img.src = imageUrl;
    download.href = imageUrl;

    const li = document.createElement("li");
    li.textContent = prompt;
    li.onclick = function() {
      input.value = prompt;
    };

    lista.prepend(li);

    loading.style.display = "none";
  }, 800);
});
</script>

</body>
