<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Imagens IA</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>Gerador de Imagens IA</h1>

  <form id="form">
    <input type="text" id="prompt" placeholder="Descreva sua imagem..." required>
    <button type="submit">Gerar</button>
  </form>

  <div id="loading">Gerando imagem...</div>

  <img id="imagem" src="" alt="">

  <a id="download" download>
    <button id="btnDownload">Baixar imagem</button>
  </a>
</div>

<script src="script.js"></script>

</body>
</html>
