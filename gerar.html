<body>

<div class="container">

  <h1> Gerador de Imagens IA</h1>

  <form id="form">
    <input type="text" id="prompt" placeholder="Descreva sua imagem..." required>
    <button type="submit">Gerar</button>
  </form>

  <!-- sugestões -->
  <div class="sugestoes">
    <button onclick="usarPrompt('homem aranha realista')">🕷️ Spider-Man</button>
    <button onclick="usarPrompt('carro futurista neon')">🚗 Cyberpunk</button>
    <button onclick="usarPrompt('dragão voando')">🐉 Dragão</button>
  </div>

  <div id="loading">⏳ Gerando imagem...</div>

  <img id="imagem" src="">

  <a id="download" download>
    <button>⬇ Baixar</button>
  </a>

  <div class="historico">
    <h3>Histórico</h3>
    <ul id="listaHistorico"></ul>
  </div>

  <a class="voltar" href="index.html">⬅ Voltar</a>

</div>

<script src="script.js"></script>

</body>
